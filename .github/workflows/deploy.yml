name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 18.14

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Show build info
        run: |
          echo "=== Public folder size ==="
          du -sh public/
          echo "=== File count ==="
          find public/ -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to server
        run:  |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "=== Generating local manifest ==="
          find ./public/ -type f -exec md5sum {} \; | sort > .local_manifest.txt
          head -5 .local_manifest.txt
          echo "=== Remote manifest ==="
          ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "cat ${{ secrets.SERVER_PATH }}/.manifest 2>/dev/null || echo 'Manifest not found'" > .remote_manifest.txt
          head -5 .remote_manifest.txt
          echo "=== File count comparison ==="
          echo "Local files: $(wc -l < .local_manifest.txt)"
          echo "Remote files: $(wc -l < .remote_manifest.txt)"
          if diff .local_manifest.txt .remote_manifest.txt > /dev/null 2>&1; then
            echo "No changes detected, skipping upload"
          else
            echo "=== Files to be transferred ==="
            diff .local_manifest.txt .remote_manifest.txt | grep "^<" | awk '{print $2}' | wc -l
            echo "Changes detected, uploading..."
            rsync -avz --checksum --no-times --stats --delete \
              -e "ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no" \
              ./public/ \
              ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/
            echo "=== Update remote manifest ==="
            ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "mkdir -p ${{ secrets.SERVER_PATH }}"
            scp -P ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no .local_manifest.txt ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/.manifest
            echo "=== Verify manifest upload ==="
            ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "wc -l ${{ secrets.SERVER_PATH }}/.manifest"
            echo "Deployment complete"
          fi

      - name: Verify server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Deployment verified ==="
            ls -la ${{ secrets.SERVER_PATH }}
            echo "=== Disk usage ==="
            df -h ${{ secrets.SERVER_PATH }}

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
