name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
        - main

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 18.14

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Show build info
        run: |
          echo "=== Public folder size ==="
          du -sh public/
          echo "=== File count ==="
          find public/ -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # ===== 方案1: 用 rsync 替代 scp（推荐）=====
      - name: rsync files to server
        uses: burnett01/rsync-deployments@5.2
        with:
          hosts: "${{ secrets.SERVER_HOST }}"
          user: "${{ secrets.SERVER_USERNAME }}"
          key: "${{ secrets.SSH_PRIVATE_KEY }}"
          port: "${{ secrets.SERVER_PORT }}"
          source: "./public/"
          target: "${{ secrets.SERVER_PATH }}"
          args: "--recursive --compress --delete --omit-dir-times"
          timeout: 30

      # ===== 方案2: 如果 rsync 也有问题，用压缩传输 =====
      # - name: Prepare tarball
      #   run: tar -czf /tmp/quartz.tar.gz public/
      #
      # - name: copy file to server
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USERNAME }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     port: ${{ secrets.SERVER_PORT }}
      #     source: /tmp/quartz.tar.gz
      #     target: /tmp/quartz.tar.gz
      #     strip_components: 0
      #     command_timeout: 60m
      #
      # - name: extract on server
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USERNAME }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     port: ${{ secrets.SERVER_PORT }}
      #     script: |
      #       cd ${{ secrets.SERVER_PATH }}
      #       tar -xzf /tmp/quartz.tar.gz
      #       rm /tmp/quartz.tar.gz
      #       echo "Deploy completed!"

      - name: Verify server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Deployment verified ==="
            ls -la ${{ secrets.SERVER_PATH }}
            echo "=== Disk usage ==="
            df -h ${{ secrets.SERVER_PATH }}


  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4