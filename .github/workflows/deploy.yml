name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18.14

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Show build info
        run: |
          echo "=== Public folder size ==="
          du -sh public/
          echo "=== File count ==="
          find public/ -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to server
        run:  |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "=== Generating local manifest ==="
          find ./public/ -type f -exec md5sum {} \; | sort > .local_manifest.txt
          echo "Local manifest generated: $(wc -l < .local_manifest.txt) files"
          
          echo "=== Check remote manifest existence ==="
          ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "ls -la ${{ secrets.SERVER_PATH }}/.manifest 2>/dev/null || echo 'Manifest does not exist'"
          
          echo "=== Remote manifest ==="
          ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "cat ${{ secrets.SERVER_PATH }}/.manifest 2>/dev/null" > .remote_manifest.txt
          remote_count=$(wc -l < .remote_manifest.txt)
          echo "Remote manifest has $remote_count files"
          
          echo "=== File count comparison ==="
          local_count=$(wc -l < .local_manifest.txt)
          echo "Local files: $local_count"
          echo "Remote files: $remote_count"
          
          echo "=== Check manifest diff ==="
          changed_files=$(diff .local_manifest.txt .remote_manifest.txt | grep "^<" | wc -l)
          echo "Files with changed checksums: $changed_files"
          
          if [ "$changed_files" -eq 0 ]; then
            echo "No changes detected, skipping upload"
          else
            echo "=== First 10 changed files ==="
            diff .local_manifest.txt .remote_manifest.txt | grep "^<" | head -10
            echo "Changes detected, uploading..."
            rsync -rlvz \
              --checksum \
              --delete \
              --stats \
              --itemize-changes \
              --human-readable \
              --info=progress2 \
              -e "ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no" \
              ./public/ \
              ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/
            echo "=== Update remote manifest ==="
            ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "mkdir -p ${{ secrets.SERVER_PATH }}"
            scp -P ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no .local_manifest.txt ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/.manifest
            echo "=== Verify manifest upload ==="
            ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "wc -l ${{ secrets.SERVER_PATH }}/.manifest"
            echo "Deployment complete"
          fi

      - name: Verify server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Deployment verified ==="
            ls -la ${{ secrets.SERVER_PATH }}
            echo "=== Disk usage ==="
            df -h ${{ secrets.SERVER_PATH }}

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
